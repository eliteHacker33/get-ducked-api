# CI/CD Pipeline for get-ducked-api
# Requires these secrets per environment: MONGODB_URI, FIREBASE_SERVICE_ACCOUNT, JWT_SECRET
# Requires repo-level secrets: DOCKERHUB_USERNAME, DOCKERHUB_TOKEN
# FIREBASE_SERVICE_ACCOUNT must be a repo/org secret (not environment-only) so the build job can push to Artifact Registry
# Production environment must have "Required reviewers" set for manual approval
# Firebase service account: Cloud Run Admin, Artifact Registry Writer, and Service Account User on the Cloud Run runtime SA
# One-time per GCP project: create docker Artifact Registry repo "get-ducked-api" in us-central1, e.g.:
#   gcloud artifacts repositories create get-ducked-api --repository-format=docker --location=us-central1 --project=PROJECT_ID
name: CI/CD Pipeline

on:
  pull_request:
    branches: [master]
  push:
    branches: [master]

env:
  DOCKER_IMAGE: anambypamby/get-ducked-api
  AR_LOCATION: us-central1
  # Artifact Registry (test): Cloud Run pulls from here; Docker Hub mirror does not apply.
  AR_IMAGE_TEST: us-central1-docker.pkg.dev/get-ducked-api-test/get-ducked-api/get-ducked-api

jobs:
  # ============================================
  # Job 1: Run tests (required before PR merge)
  # ============================================
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

  # ============================================
  # Job 2: Build and push Docker image (on merge to main only)
  # ============================================
  build:
    name: Build & Push
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # This job has no `environment:` — only repo/org secrets are visible here.
      # If FIREBASE_SERVICE_ACCOUNT exists only under an environment, auth fails with:
      # "must specify exactly one of workload_identity_provider or credentials_json"
      - name: Require FIREBASE_SERVICE_ACCOUNT (repository secret)
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: |
          if [ -z "${FIREBASE_SERVICE_ACCOUNT}" ]; then
            echo "::error::FIREBASE_SERVICE_ACCOUNT is empty for the build job. Add the same JSON key under Settings → Secrets and variables → Actions → Repository secrets (not only Environment secrets). Fork/Dependabot workflows also omit secrets."
            exit 1
          fi

      - name: Authenticate to Google Cloud (push image to Artifact Registry)
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.AR_LOCATION }}-docker.pkg.dev --quiet

      - name: Extract metadata and build
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ env.DOCKER_IMAGE }}
            ${{ env.AR_IMAGE_TEST }}
          tags: |
            type=raw,value=${{ github.sha }}
            type=raw,value=latest

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  # ============================================
  # Job 3: Deploy to test environment
  # ============================================
  deploy-test:
    name: Deploy to Test
    runs-on: ubuntu-latest
    needs: build
    environment: test
    steps:
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}

      - name: Deploy to Cloud Run (Test)
        id: deploy-test
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: get-ducked-api
          image: ${{ env.AR_IMAGE_TEST }}:${{ github.sha }}
          region: us-central1
          project_id: get-ducked-api-test
          env_vars: |
            MONGODB_URI=${{ secrets.MONGODB_URI }}
            JWT_SECRET=${{ secrets.JWT_SECRET }}
            NODE_ENV=production
          env_vars_update_strategy: overwrite

  # ============================================
  # Job 4: Deploy to production (manual approval required)
  # ============================================
  deploy-prod:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: deploy-test
    environment: production
    steps:
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}

      - name: Deploy to Cloud Run (Production)
        id: deploy-prod
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: get-ducked-api
          image: docker.io/${{ env.DOCKER_IMAGE }}:${{ github.sha }}
          region: us-central1
          project_id: get-ducked-api-prod
          env_vars: |
            MONGODB_URI=${{ secrets.MONGODB_URI }}
            JWT_SECRET=${{ secrets.JWT_SECRET }}
            NODE_ENV=production
          env_vars_update_strategy: overwrite
